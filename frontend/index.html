<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAPI Dashboard</title>
  </head>

  <body>
    <div id="root"></div>

    <h2>Assinar Plano</h2>

    <form id="form-checkout">
      <input id="cardholderName" placeholder="Nome" required />
      <input id="cardNumber" placeholder="Número do cartão" required />
      <input id="expirationDate" placeholder="MM/YY" required />
      <input id="securityCode" placeholder="CVV" required />

      <button type="submit">Assinar</button>
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
